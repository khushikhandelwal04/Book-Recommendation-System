<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommendation</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">


</head>
<body>

    <div class="container">
        <h1>📚 Book Recommendation System</h1>

        <!-- Search Form -->
        <form action="/recommend" method="post" class="search-box">
            <input type="text" name="title" class="form-control w-50" placeholder="Enter a book title..." required>
            <button type="submit" class="btn btn-primary ms-2">Recommend</button>
        </form>

        {% if recommendations %}
            <h2 class="mt-4 text-center">Recommendations for: <strong>{{ book_title }}</strong></h2>
            <div class="book-list">
                {% for book in recommendations %}
                    <div class="book">
                        <img src="{{ book['thumbnail'] }}" alt="{{ book['title'] }}">
                        <p class="book-title">{{ book['title'] }}</p>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
